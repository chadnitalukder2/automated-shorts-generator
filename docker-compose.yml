version: '3.9'

services:
  # ── Redis (BullMQ backend) ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Main app (HTTP API + cron scheduler) ─────────────────────────────────────
  app:
    build:
      context: .
      target: production
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=production
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - outputs:/app/outputs
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    # Chromium sandbox settings
    security_opt:
      - seccomp:unconfined
    shm_size: '2gb'

  # ── Worker (BullMQ job processor) ─────────────────────────────────────────────
  worker:
    build:
      context: .
      target: production
    restart: unless-stopped
    command: node src/queue/workers.js
    env_file: .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=production
    volumes:
      - outputs:/app/outputs
    depends_on:
      redis:
        condition: service_healthy
    # Chromium sandbox settings
    security_opt:
      - seccomp:unconfined
    shm_size: '2gb'
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 4g
        reservations:
          memory: 1g

  # ── Bull Board (queue dashboard) ──────────────────────────────────────────────
  bullboard:
    image: deadly0/bull-board:latest
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis

volumes:
  redis-data:
  outputs:
